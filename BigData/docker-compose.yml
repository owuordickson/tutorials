version: '3.8'

services:
  # --- HADOOP 3.5.0 CLUSTER ---
  namenode:
    image: apache/hadoop:3.5.0
    container_name: namenode
    hostname: namenode
    command: ["hdfs", "namenode"]
    ports:
      - "9870:9870"
      - "9000:9000"
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop_namenode:/opt/hadoop/dfs/name

  datanode:
    image: apache/hadoop:3.5.0
    container_name: datanode
    command: ["hdfs", "datanode"]
    ports:
      - "9864:9864"
    env_file:
      - ./hadoop.env
    environment:
      - ENSURE_NAMENODE_DIR=/opt/hadoop/dfs/name
    volumes:
      - hadoop_datanode:/opt/hadoop/dfs/data
    depends_on:
      - namenode

  # --- APACHE KAFKA BROKER ---
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

  # --- SPARK 4.0.0 ENGINE ---
  spark-master:
    image: apache/spark:4.0.0-python3
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]

  spark-worker:
    image: apache/spark:4.0.0-python3
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

  # --- APACHE ZEPPELIN NOTEBOOK ---
  zeppelin:
    image: apache/zeppelin:0.12.1
    container_name: zeppelin
    ports:
      - "8082:8080"  # Exposes Zeppelin Web UI on local port 8082
    environment:
      ZEPPELIN_ADDR: "0.0.0.0"
      SPARK_MASTER: "spark://spark-master:7077"
      HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
    volumes:
      - zeppelin_notebooks:/opt/zeppelin/notebook
    depends_on:
      - spark-master
      - namenode

  # --- NODE-RED DATA GENERATOR ---
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    ports:
      - "1880:1880"  # Node-RED Visual Workflow UI
    volumes:
      - nodered_data:/data
    depends_on:
      - kafka

volumes:
  hadoop_namenode:
  hadoop_datanode:
  zeppelin_notebooks:
  nodered_data:
